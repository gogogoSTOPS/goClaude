<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Audience Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; font-size: 14px; color: #111; padding: 20px; background: #fff; }
h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
select { font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; background: #fff; }
input[type=range] { width: 120px; }
button { font-size: 13px; padding: 7px 16px; border-radius: 6px; border: 1px solid #534AB7; background: #534AB7; color: #fff; cursor: pointer; }
button:hover { background: #3d3690; }
button.secondary { background: #fff; color: #534AB7; }
button.secondary:hover { background: #f0effe; }
#status { font-size: 12px; color: #666; margin-bottom: 12px; min-height: 18px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; font-weight: 600; color: #666; padding: 6px 10px; border-bottom: 1px solid #eee; background: #fafafa; }
td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:hover td { background: #fafafa; }
.bar-wrap { width: 80px; background: #eee; border-radius: 3px; height: 8px; display: inline-block; vertical-align: middle; }
.bar { height: 8px; border-radius: 3px; background: #534AB7; }
.pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eeedfe; color: #534AB7; font-weight: 500; }
.pill.strong { background: #eaf3de; color: #3B6D11; }
.pill.weak { background: #faeeda; color: #BA7517; }
#users-section { margin-top: 24px; }
#user-table-wrap { max-height: 320px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; }
</style>
</head>
<body>
<h2>Audience builder — by target city</h2>

<div class="row">
  <div>
    <label>Target city</label>
    <select id="target">
      <option value="">Select a city…</option>
    </select>
  </div>
  <div>
    <label>Min probability: <span id="prob-val">5%</span></label>
    <input type="range" id="min-prob" min="1" max="40" step="1" value="5">
  </div>
</div>

<div id="status"></div>
<div id="origins-section" style="display:none">
  <table id="origins-table">
    <thead>
      <tr>
        <th><input type="checkbox" id="select-all" checked></th>
        <th>Origin city</th>
        <th>Went to target</th>
        <th>Total travellers</th>
        <th>Transition probability</th>
        <th>Signal</th>
      </tr>
    </thead>
    <tbody id="origins-body"></tbody>
  </table>
  <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button id="btn-export-origins" class="secondary">Export origin list (CSV)</button>
    <span id="selected-count" style="font-size:12px;color:#666;"></span>
  </div>
</div>

// build lookup: target -> [{from, went, total, prob}]
const byTarget = {};
TRANSITIONS.forEach(([from, to, went, total, prob]) => {
  if (!byTarget[to]) byTarget[to] = [];
  byTarget[to].push({from, went, total, prob});
});

const cities = [...new Set(TRANSITIONS.map(r => r[1]))].sort();
const targetEl = document.getElementById('target');
cities.forEach(c => {
  const o = document.createElement('option'); o.value = c; o.textContent = c;
  targetEl.appendChild(o);
});

const minProbEl = document.getElementById('min-prob');
const probValEl = document.getElementById('prob-val');
minProbEl.addEventListener('input', () => { probValEl.textContent = minProbEl.value + '%'; renderOrigins(); });
targetEl.addEventListener('change', renderOrigins);
document.getElementById('select-all').addEventListener('change', function() {
  document.querySelectorAll('.origin-check').forEach(c => c.checked = this.checked);
  updateCount();
});

function updateCount() {
  const n = document.querySelectorAll('.origin-check:checked').length;
  document.getElementById('selected-count').textContent = n ? `${n} origins selected` : '';
}

function renderOrigins() {
  const target = targetEl.value;
  const minProb = +minProbEl.value;
  const statusEl = document.getElementById('status');
  const section = document.getElementById('origins-section');

  if (!target) { section.style.display = 'none'; statusEl.textContent = ''; return; }

  const rows = (byTarget[target] || [])
    .filter(r => r.prob >= minProb)
    .sort((a, b) => b.prob - a.prob);

  if (!rows.length) {
    statusEl.textContent = `No origin cities with ≥${minProb}% probability for ${target}. Try lowering the threshold.`;
    section.style.display = 'none';
    return;
  }

  statusEl.textContent = `${rows.length} origin cities → ${target} with ≥${minProb}% transition probability`;
  const maxProb = rows[0].prob;
  const tbody = document.getElementById('origins-body');
  tbody.innerHTML = rows.map(r => {
    const signal = r.prob >= 15 ? 'strong' : r.prob >= 7 ? '' : 'weak';
    const label = r.prob >= 15 ? 'Strong' : r.prob >= 7 ? 'Medium' : 'Weak';
    return `<tr>
      <td><input type="checkbox" class="origin-check" value="${r.from}" checked onchange="updateCount()"></td>
      <td><strong>${r.from}</strong></td>
      <td>${r.went.toLocaleString()}</td>
      <td>${r.total.toLocaleString()}</td>
      <td>
        <span class="bar-wrap"><span class="bar" style="width:${Math.round((r.prob/maxProb)*100)}%"></span></span>
        <span style="margin-left:6px;font-weight:600;">${r.prob}%</span>
      </td>
      <td><span class="pill ${signal}">${label}</span></td>
    </tr>`;
  }).join('');

  section.style.display = 'block';
  updateCount();
}

document.getElementById('btn-export-origins').addEventListener('click', () => {
  const target = targetEl.value;
  if (!target) return;
  const checked = [...document.querySelectorAll('.origin-check:checked')].map(c => c.value);
  const rows = (byTarget[target] || []).filter(r => checked.includes(r.from)).sort((a,b) => b.prob - a.prob);
  const header = 'Origin City,Went to Target,Total Travellers,Transition Probability %';
  const lines = rows.map(r => `"${r.from}",${r.went},${r.total},${r.prob}`);
  const csv = [header, ...lines].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `audience_origins_${target.replace(/\s/g,'_')}.csv`;
  a.click();
});

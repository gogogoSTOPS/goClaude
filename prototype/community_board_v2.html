<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>goSTOPS Community Board</title>
<style>
:root{
  --brand:#FF5C35;--brand-dark:#E04820;--brand-bg:#FFF0EC;
  --green:#22C55E;--green-bg:#F0FDF4;
  --surface:#fff;--bg:#F2F2F7;--text:#1C1C1E;--text2:#636366;--text3:#AEAEB2;
  --border:#E5E5EA;--radius:14px;--shadow:0 1px 6px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}

.hdr{background:var(--brand);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:700;flex:1}
.hdr-sub{font-size:12px;opacity:.8}
.sel-wrap{position:relative}
.sel{width:100%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);color:#fff;padding:9px 32px 9px 13px;border-radius:10px;font-size:13px;font-weight:600;appearance:none;cursor:pointer}
.sel option{background:#2c2c2e;color:#fff}
.sel-wrap::after{content:"▾";position:absolute;right:11px;top:50%;transform:translateY(-50%);color:#fff;font-size:12px;pointer-events:none}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:105px;z-index:99}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}

/* CATEGORY FILTER */
.catrow{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:149px;z-index:98;scrollbar-width:none}
.catrow::-webkit-scrollbar{display:none}
.catbtn{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);background:#fff;white-space:nowrap;transition:all .12s}
.catbtn.on{background:var(--brand);border-color:var(--brand);color:#fff}

.main{padding:14px 14px 80px;max-width:460px;margin:0 auto}

.slabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}
.slabel:first-child{margin-top:6px}

/* VIBE CARD */
.vibe{background:var(--surface);border-radius:var(--radius);padding:13px 15px;margin-bottom:14px;box-shadow:var(--shadow)}
.vibe-city{font-size:18px;font-weight:800}
.vibe-tag{display:inline-block;font-size:11px;font-weight:600;background:var(--brand-bg);color:var(--brand);padding:2px 8px;border-radius:20px;margin-top:5px}

/* ACTIVE EVENT CARD */
.ecard{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.ecard-top{display:flex;gap:12px;align-items:flex-start}
.emoji-big{font-size:30px;flex-shrink:0;line-height:1;margin-top:2px}
.einfo{flex:1;min-width:0}
.elabel{font-size:15px;font-weight:700;margin-bottom:2px}
.etime{font-size:12px;color:var(--brand);font-weight:600;margin-bottom:3px}
.edesc{font-size:13px;color:var(--text2);line-height:1.4}
.efoot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.avs{display:flex}
.av{width:24px;height:24px;border-radius:50%;background:var(--brand-bg);border:2px solid #fff;margin-left:-5px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--brand);flex-shrink:0}
.av:first-child{margin-left:0}
.going{font-size:12px;color:var(--text2);margin-left:7px;font-weight:500}
.jbtn{background:var(--brand);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0}
.jbtn.on{background:var(--green)}
.jbtn:active{transform:scale(.94)}
.slots{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:6px;margin-left:6px}

.cmts{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.cmts-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;user-select:none}
.cmts-head span{font-size:12px;font-weight:700;color:var(--text2)}
.cmts-toggle{font-size:11px;color:var(--brand);font-weight:600}
.cmt{display:flex;gap:8px;margin-bottom:8px}
.cmt-av{width:22px;height:22px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:1px}
.cmt-body{flex:1;min-width:0}
.cmt-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:1px}
.cmt-text{font-size:13px;color:var(--text2);line-height:1.4}
.cmt-src{font-size:10px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:3px}
.src-dot{width:5px;height:5px;border-radius:50%;background:var(--brand-bg);border:1px solid var(--brand);flex-shrink:0}
.add-cmt{display:flex;gap:8px;margin-top:8px;align-items:center}
.add-cmt input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;font-size:13px;color:var(--text);background:var(--bg);outline:none}
.add-cmt input:focus{border-color:var(--brand)}
.add-cmt button{background:var(--brand);color:#fff;border:none;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty div{font-size:44px;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.5}
.empty small{font-size:12px;display:block;margin-top:5px}

/* EXPLORE CARD (new, more specific) */
.xcard{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.xcard:active{border-color:var(--brand)}
.xcard-top{display:flex;gap:10px;align-items:flex-start}
.xcard-emoji{font-size:28px;flex-shrink:0;margin-top:1px}
.xcard-body{flex:1;min-width:0}
.xcard-label{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3}
.xcard-catbadge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;background:var(--bg);color:var(--text2);padding:2px 7px;border-radius:10px;margin-bottom:5px}
.xcard-desc{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:6px}
.xcard-quote{font-size:12px;color:var(--text2);font-style:italic;border-left:2px solid var(--brand-bg);padding-left:8px;margin-bottom:8px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.xcard-foot{display:flex;align-items:center;justify-content:space-between}
.xcard-count{font-size:11px;color:var(--text3);font-weight:500}
.xbtn{background:var(--brand);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.arr{color:var(--text3);font-size:18px;flex-shrink:0;align-self:center;margin-left:4px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex;animation:fi .15s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:#fff;width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:6px 18px 44px;max-height:88vh;overflow-y:auto;animation:su .2s ease-out}
@keyframes su{from{transform:translateY(28px);opacity:.8}to{transform:translateY(0);opacity:1}}
.mhandle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 18px}
.mtitle{font-size:19px;font-weight:800;margin-bottom:3px}
.msub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.4}
.past-msgs{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:18px}
.past-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.past-item{display:flex;gap:7px;margin-bottom:7px}
.past-item:last-child{margin-bottom:0}
.past-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);margin-top:5px;flex-shrink:0}
.past-text{font-size:12px;color:var(--text2);font-style:italic;line-height:1.4}
.flabel{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:block}
.fgroup{margin-bottom:18px}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .1s;background:#fff}
.pill.on{background:var(--brand);border-color:var(--brand);color:#fff}
.tinput{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;color:var(--text);outline:none;margin-top:9px}
.tinput:focus{border-color:var(--brand)}
.ninput{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;color:var(--text);outline:none;min-height:72px;resize:none;font-family:inherit;line-height:1.5}
.ninput:focus{border-color:var(--brand)}
.pbtn{width:100%;background:var(--brand);color:#fff;border:none;padding:15px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;margin-top:6px}
.pbtn:active{background:var(--brand-dark);transform:scale(.98)}
.xbtn-modal{width:100%;background:none;color:var(--text2);border:none;padding:11px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:#1c1c1e;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">

<div class="overlay" id="overlay" onclick="overlayClick(event)">

// ─── STATE ──────────────────────────────────────────────────────────────────
let hostel=Object.keys(BOARDS)[0], tab='board', catFilter='all', pending=null;

// ─── UTILS ──────────────────────────────────────────────────────────────────
function gs(){try{return JSON.parse(localStorage.getItem('gcb4')||'{}')}catch{return {}}}
function ss(v){localStorage.setItem('gcb4',JSON.stringify(v))}
function me(){if(!localStorage.getItem('gcb_me'))localStorage.setItem('gcb_me','You');return localStorage.getItem('gcb_me')}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function catName(id){return CATS.find(c=>c.id===id)||{label:'',emoji:''}}

// ─── INIT ───────────────────────────────────────────────────────────────────
function init(){
  const sel=document.getElementById('hsel');
  Object.entries(BOARDS).forEach(([k,b])=>{
    const o=document.createElement('option');
    o.value=k; o.textContent=b.hostel; sel.appendChild(o);
  });
  renderCatRow();
  seedDemo();
  render();
}

function switchHostel(h){hostel=h;catFilter='all';renderCatRow();render();}
function switchTab(t){tab=t;document.getElementById('t-board').classList.toggle('on',t==='board');document.getElementById('t-explore').classList.toggle('on',t==='explore');render();}
function switchCat(c){catFilter=c;renderCatRow();render();}

function renderCatRow(){
  const row=document.getElementById('catrow');
  row.innerHTML=CATS.map(c=>`<button class="catbtn ${catFilter===c.id?'on':''}" onclick="switchCat('${c.id}')">${c.emoji} ${c.label}</button>`).join('');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const board=BOARDS[hostel]; if(!board)return;
  const st=gs(); const hs=st[hostel]||{events:[]};
  const evs=hs.events||[];
  document.getElementById('evCount').textContent=evs.length?`${evs.length} live`:'';
  const main=document.getElementById('main');
  if(tab==='board') renderBoard(main,board,evs);
  else renderExplore(main,board);
}

function renderBoard(main,board,evs){
  let h=`<div class="vibe"><div class="vibe-city">${board.city}</div>${board.personality?`<div class="vibe-tag">${board.personality}</div>`:''}</div>`;
  h+='<div class="slabel">Happening now</div>';
  const filtered = catFilter==='all' ? evs : evs.filter(ev=>ev.cat===catFilter);
  if(!filtered.length){
    h+=`<div class="empty"><div>🌅</div><p>No events yet${catFilter!=='all'?' in this category':''}.</p><small>Switch to <b>Explore</b> to post one!</small></div>`;
  } else {
    filtered.forEach(ev=>{
      const joined=ev.attendees.includes(me());
      const slotsLeft=ev.slots?ev.slots-ev.attendees.length:null;
      const avHTML=ev.attendees.slice(0,5).map(n=>`<div class="av">${n.charAt(0).toUpperCase()}</div>`).join('');
      const cmts=ev.comments||[]; const srcMsgs=ev.sourceMsgs||[];
      const totalCmts=srcMsgs.length+cmts.length; const isExpanded=ev._cmtOpen;
      let cmtHTML='';
      if(isExpanded){
        srcMsgs.forEach(m=>{const init=m.charAt(0).toUpperCase();cmtHTML+=`<div class="cmt"><div class="cmt-av" style="background:var(--brand-bg);color:var(--brand);border-color:var(--brand-bg)">${init}</div><div class="cmt-body"><div class="cmt-text">${escH(m)}</div><div class="cmt-src"><span class="src-dot"></span>from past chats at this hostel</div></div></div>`;});
        cmts.forEach(c=>{cmtHTML+=`<div class="cmt"><div class="cmt-av">${c.name.charAt(0).toUpperCase()}</div><div class="cmt-body"><div class="cmt-name">${escH(c.name)}</div><div class="cmt-text">${escH(c.text)}</div></div></div>`;});
        cmtHTML+=`<div class="add-cmt"><input id="ci_${ev.id}" placeholder="Add a comment…" maxlength="100" onkeydown="cmtKey(event,'${ev.id}')"><button onclick="addCmt('${ev.id}')">↑</button></div>`;
      }
      const c=catName(ev.cat||'');
      h+=`<div class="ecard"><div class="ecard-top"><div class="emoji-big">${ev.emoji}</div><div class="einfo"><div class="elabel">${escH(ev.label)}</div><div class="etime">⏰ ${escH(ev.time)}${c.label?` · <span style="font-size:10px;opacity:.7">${c.emoji} ${c.label}</span>`:''}</div><div class="edesc">${escH(ev.note||ev.desc||'')}</div></div></div><div class="efoot"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px"><div class="avs">${avHTML}</div><span class="going">${ev.attendees.length} going</span>${slotsLeft!==null?`<span class="slots">${slotsLeft} left</span>`:''}</div><button class="jbtn ${joined?'on':''}" onclick="toggleJoin('${ev.id}')">${joined?'✓ Joined':'Join'}</button></div><div class="cmts"><div class="cmts-head" onclick="toggleCmts('${ev.id}')"><span>💬 ${totalCmts} comment${totalCmts!==1?'s':''}</span><span class="cmts-toggle">${isExpanded?'Hide':'Show'}</span></div>${isExpanded?cmtHTML:''}</div></div>`;
    });
  }
  main.innerHTML=h;
}

function renderExplore(main,board){
  const cats=board.categories; let h='';
  if(catFilter==='all'){
    // Show all categories with section headers
    Object.entries(cats).forEach(([catId,items])=>{
      const ci=CATS.find(c=>c.id===catId)||{emoji:'',label:catId};
      h+=`<div class="slabel">${ci.emoji} ${ci.label||catId}</div>`;
      items.forEach(item=>{ h+=exploreCard(item,catId); });
    });
  } else {
    // Show only selected category
    const items=cats[catFilter];
    if(!items||!items.length){
      h=`<div class="empty"><div>${catName(catFilter).emoji||'🔍'}</div><p>No ${catName(catFilter).label} ideas for this hostel yet.</p></div>`;
    } else {
      const ci=CATS.find(c=>c.id===catFilter)||{emoji:'',label:catFilter};
      h=`<div class="slabel">${ci.emoji} ${ci.label}</div>`;
      items.forEach(item=>{ h+=exploreCard(item,catFilter); });
    }
  }
  h+='<div style="height:20px"></div>';
  main.innerHTML=h;
}

function exploreCard(item,catId){
  const ci=CATS.find(c=>c.id===catId)||{emoji:'',label:catId};
  const quote=item.msgs&&item.msgs.length?item.msgs[0]:'';
  return `<div class="xcard" onclick="openModal('${item.id}','${catId}')">
    <div class="xcard-top">
      <div class="xcard-emoji">${item.emoji}</div>
      <div class="xcard-body">
        <div class="xcard-catbadge">${ci.emoji} ${ci.label||catId}</div>
        <div class="xcard-label">${escH(item.label)}</div>
        <div class="xcard-desc">${escH(item.desc)}</div>
        ${quote?`<div class="xcard-quote">"${escH(quote)}"</div>`:''}
        <div class="xcard-foot">
          <span class="xcard-count">💬 ${item.count} guests mentioned this</span>
          <button class="xbtn">Post →</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(itemId, catId){
  const board=BOARDS[hostel]; if(!board)return;
  const items=board.categories[catId]||[];
  const item=items.find(i=>i.id===itemId); if(!item)return;
  pending={...item, cat:catId};
  const pills=(item.times||['6:00 PM']).map((t,i)=>`<button class="pill ${i===0?'on':''}" onclick="selPill(this,'${t}')">${t}</button>`).join('');
  const msgsHTML=(item.msgs||[]).slice(0,4).map(m=>`<div class="past-item"><div class="past-dot"></div><div class="past-text">"${escH(m)}"</div></div>`).join('');
  const ci=CATS.find(c=>c.id===catId)||{emoji:'',label:catId};
  document.getElementById('mbody').innerHTML=`
    <div class="mhandle"></div>
    <div style="font-size:38px;margin-bottom:8px">${item.emoji}</div>
    <div class="mtitle">${escH(item.label)}</div>
    <div style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;background:var(--bg);color:var(--text2);padding:3px 9px;border-radius:10px;margin-bottom:10px">${ci.emoji} ${ci.label}</div>
    <div class="msub">${escH(item.desc)}</div>
    ${msgsHTML?`<div class="past-msgs"><div class="past-label">💬 What guests said at this hostel</div>${msgsHTML}</div>`:''}
    <div class="fgroup"><label class="flabel">When?</label><div class="pills" id="pills">${pills}</div><input class="tinput" id="ctime" type="time" placeholder="Or pick a custom time" oninput="clearPills()"></div>
    <div class="fgroup"><label class="flabel">Add a note (optional)</label><textarea class="ninput" id="note" placeholder="e.g. meeting at reception, all levels welcome…" maxlength="120"></textarea></div>
    <button class="pbtn" onclick="post()">Post to Board</button>
    <button class="xbtn-modal" onclick="closeModal()">Cancel</button>
  `;
  document.getElementById('overlay').classList.add('on');
}

function selPill(btn,t){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));btn.classList.add('on');document.getElementById('ctime').value='';}
function clearPills(){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('on');pending=null;}

function getTime(){const p=document.querySelector('.pill.on');if(p)return p.textContent;const v=document.getElementById('ctime').value;if(v){const[h,m]=v.split(':');const hr=parseInt(h);return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;}return null;}

function post(){
  const t=getTime();if(!t){toast('Pick a time ⏰');return;}
  const note=document.getElementById('note').value.trim();
  const tpl=pending;
  const ev={
    id:Date.now()+'_'+Math.random().toString(36).slice(2,5),
    cat:tpl.cat, label:tpl.label, emoji:tpl.emoji, desc:tpl.desc,
    time:t, note:note||null, slots:tpl.slots||null,
    host:me(), attendees:[me()],
    sourceMsgs:(tpl.msgs||[]).slice(0,3), comments:[], _cmtOpen:true,
    createdAt:Date.now()
  };
  const s=gs();if(!s[hostel])s[hostel]={events:[]};
  s[hostel].events.unshift(ev);ss(s);
  closeModal();switchTab('board');
  toast(`${tpl.emoji} Posted! You're going.`);
}

// ─── JOIN ────────────────────────────────────────────────────────────────────
function toggleJoin(id){
  const s=gs();const hs=s[hostel];if(!hs)return;
  const ev=hs.events.find(e=>e.id===id);if(!ev)return;
  const i=ev.attendees.indexOf(me());
  if(i===-1){if(ev.slots&&ev.attendees.length>=ev.slots){toast('No spots left!');return;}ev.attendees.push(me());ss(s);toast(`${ev.emoji} You're in!`);}
  else{ev.attendees.splice(i,1);ss(s);toast('Left the event');}
  render();
}

// ─── COMMENTS ────────────────────────────────────────────────────────────────
function toggleCmts(id){const s=gs();const ev=(s[hostel]?.events||[]).find(e=>e.id===id);if(!ev)return;ev._cmtOpen=!ev._cmtOpen;ss(s);render();}
function cmtKey(e,id){if(e.key==='Enter')addCmt(id);}
function addCmt(id){const inp=document.getElementById('ci_'+id);if(!inp)return;const txt=inp.value.trim();if(!txt)return;const s=gs();const ev=(s[hostel]?.events||[]).find(e=>e.id===id);if(!ev)return;if(!ev.comments)ev.comments=[];ev.comments.push({name:me(),text:txt});ss(s);inp.value='';render();}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('on'),2200);}

// ─── SEED DEMO ───────────────────────────────────────────────────────────────
function seedDemo(){
  const s=gs();if(s._v4)return;
  const names=['Priya','Rohan','Sam','Neha','Arjun','Isha'];
  Object.keys(BOARDS).forEach(hk=>{
    const board=BOARDS[hk];if(!s[hk])s[hk]={events:[]};
    // Seed 2 events per hostel from different categories
    let seeded=0;
    Object.entries(board.categories).forEach(([catId,items])=>{
      if(seeded>=2||!items.length)return;
      const item=items[0];
      const cnt=Math.floor(Math.random()*3)+1;
      const ats=names.slice(0,cnt);
      s[hk].events.push({
        id:hk+'_'+item.id+'_d',cat:catId,label:item.label,emoji:item.emoji,desc:item.desc,
        time:(item.times||['6:00 PM'])[0],note:null,slots:item.slots||null,
        host:ats[0],attendees:ats,sourceMsgs:(item.msgs||[]).slice(0,2),comments:[],_cmtOpen:false,
        createdAt:Date.now()-Math.floor(Math.random()*7200000)
      });
      seeded++;
    });
  });
  s._v4=true;ss(s);
}

init();
